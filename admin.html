<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Heidelberg</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen flex">

    <!-- LOGIN SCREEN (Hide this block using JS once authenticated via Firebase/Supabase) -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
            <div class="w-12 h-12 bg-red-900 text-white flex items-center justify-center font-extrabold text-2xl rounded-xl mb-6 mx-auto">H</div>
            <h2 class="text-2xl font-bold text-center mb-8">Admin Login</h2>
            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-bold mb-2">Username</label>
                    <input type="text" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-red-900 outline-none" placeholder="timothy">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Password</label>
                    <input type="password" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-red-900 outline-none" placeholder="••••••••">
                </div>
                <button type="button" onclick="document.getElementById('login-screen').style.display='none'" class="w-full bg-red-900 text-white font-bold py-3 rounded-lg hover:bg-slate-900 transition">Login</button>
            </form>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col hidden md:flex">
        <div class="text-xl font-bold mb-10 flex items-center gap-3">
            <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center">H</div> Dashboard
        </div>
        <nav class="space-y-4 flex-1">
            <a href="#" class="block bg-slate-800 px-4 py-3 rounded-lg font-medium text-white">📸 Manage Projects</a>
            <a href="#" class="block px-4 py-3 rounded-lg font-medium text-slate-400 hover:text-white hover:bg-slate-800 transition">⭐ Manage Reviews</a>
            <a href="#" class="block px-4 py-3 rounded-lg font-medium text-slate-400 hover:text-white hover:bg-slate-800 transition">💰 Update Pricing</a>
        </nav>
        <button class="text-slate-400 hover:text-white text-sm font-bold flex items-center gap-2">Log Out</button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-800">Manage Portfolio Images</h1>
            <button class="bg-red-900 text-white px-6 py-3 rounded-lg font-bold shadow-md hover:bg-red-800 transition">+ Add New Project</button>
        </header>

        <!-- Data Table Wrapper -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-500">
                    <tr>
                        <th class="p-4 font-bold">Image</th>
                        <th class="p-4 font-bold">Project Title</th>
                        <th class="p-4 font-bold">Tag (e.g. Gable Shed)</th>
                        <th class="p-4 font-bold text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <!-- Row 1 -->
                    <tr>
                        <td class="p-4"><img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?w=100" class="w-16 h-16 rounded object-cover"></td>
                        <td class="p-4 font-semibold">Modern Home Office</td>
                        <td class="p-4"><span class="bg-slate-100 px-3 py-1 rounded-full text-xs font-bold text-slate-600">Work Office Shed</span></td>
                        <td class="p-4 text-right">
                            <button class="text-blue-600 font-bold text-sm mr-4 hover:underline">Edit</button>
                            <button class="text-red-600 font-bold text-sm hover:underline">Delete</button>
                        </td>
                    </tr>
                    <!-- Row 2 -->
                    <tr>
                        <td class="p-4"><img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=100" class="w-16 h-16 rounded object-cover"></td>
                        <td class="p-4 font-semibold">Glendale Custom Build</td>
                        <td class="p-4"><span class="bg-slate-100 px-3 py-1 rounded-full text-xs font-bold text-slate-600">12x20 Shed with Loft</span></td>
                        <td class="p-4 text-right">
                            <button class="text-blue-600 font-bold text-sm mr-4 hover:underline">Edit</button>
                            <button class="text-red-600 font-bold text-sm hover:underline">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
