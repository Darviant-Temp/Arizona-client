<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heidelberg Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const API_KEY = 'pat31xs9bbcr4NjTl.5e6418c01e302cd515647362b824b8f8fff4948c97a4e96e3ea7275a3cf76c90';
        const BASE_ID = 'appk3RCqRPphjE5i6';

        // Simple auth check
        function checkLogin() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === 'timothy123') { // Hardcoded password
                document.getElementById('login-screen').style.display = 'none';
                loadAdminData();
            } else {
                alert('Incorrect password');
            }
        }

        async function loadAdminData() {
            // Load Reviews into table
            const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/Reviews`, {
                headers: { 'Authorization': `Bearer ${API_KEY}` }
            });
            const data = await response.json();
            
            let html = '';
            if(data.records) {
                data.records.forEach(record => {
                    html += `
                    <tr class="border-b">
                        <td class="p-4">${record.fields['Customer Name'] || '-'}</td>
                        <td class="p-4">${record.fields['Stars'] || '-'} Stars</td>
                        <td class="p-4 truncate max-w-xs">${record.fields['Review Text'] || '-'}</td>
                    </tr>`;
                });
            }
            document.getElementById('reviews-tbody').innerHTML = html;
        }

        async function addReview(e) {
            e.preventDefault();
            const name = document.getElementById('rev-name').value;
            const stars = document.getElementById('rev-stars').value;
            const text = document.getElementById('rev-text').value;

            const body = {
                records: [{
                    fields: { "Customer Name": name, "Stars": parseInt(stars), "Review Text": text, "Location": "Phoenix, AZ" }
                }]
            };

            const btn = document.getElementById('submit-btn');
            btn.innerText = "Saving...";

            await fetch(`https://api.airtable.com/v0/${BASE_ID}/Reviews`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            btn.innerText = "Add Review";
            e.target.reset();
            loadAdminData(); // Refresh table
            alert('Review added to website successfully!');
        }
    </script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen flex">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
            <div class="w-12 h-12 bg-red-900 text-white flex items-center justify-center font-extrabold text-2xl rounded-xl mb-6 mx-auto">H</div>
            <h2 class="text-2xl font-bold text-center mb-8">Admin Login</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold mb-2">Password</label>
                    <input type="password" id="admin-pass" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-red-900 outline-none" placeholder="Enter password">
                </div>
                <button onclick="checkLogin()" class="w-full bg-red-900 text-white font-bold py-3 rounded-lg hover:bg-slate-900 transition">Login</button>
            </div>
        </div>
    </div>

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:flex flex-col">
        <div class="text-xl font-bold mb-10 flex items-center gap-3">
            <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center">H</div> Dashboard
        </div>
        <nav class="space-y-4 flex-1">
            <a href="#" class="block bg-slate-800 px-4 py-3 rounded-lg font-medium text-white">⭐ Manage Reviews</a>
            <a href="#" class="block px-4 py-3 rounded-lg font-medium text-slate-400 hover:text-white hover:bg-slate-800 transition">To edit Pricing/Photos, log directly into Airtable</a>
        </nav>
        <a href="index.html" class="text-slate-400 hover:text-white text-sm font-bold mt-auto">← Back to Site</a>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-8">Manage Website Data</h1>
        
        <div class="grid md:grid-cols-3 gap-8">
            <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
                <h3 class="font-bold text-lg mb-4 border-b pb-2">Add New Client Review</h3>
                <form onsubmit="addReview(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Client Name</label>
                        <input type="text" id="rev-name" class="w-full border rounded p-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Stars (1-5)</label>
                        <input type="number" id="rev-stars" min="1" max="5" class="w-full border rounded p-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Review Text</label>
                        <textarea id="rev-text" rows="3" class="w-full border rounded p-2" required></textarea>
                    </div>
                    <button type="submit" id="submit-btn" class="w-full bg-red-900 text-white font-bold py-2 rounded">Add Review</button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b"><h3 class="font-bold text-lg">Live Reviews</h3></div>
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-500">
                        <tr>
                            <th class="p-4">Name</th>
                            <th class="p-4">Rating</th>
                            <th class="p-4">Review</th>
                        </tr>
                    </thead>
                    <tbody id="reviews-tbody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
