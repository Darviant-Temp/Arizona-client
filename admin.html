<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heidelberg Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const API_KEY = 'pat31xs9bbcr4NjTl.5e6418c01e302cd515647362b824b8f8fff4948c97a4e96e3ea7275a3cf76c90';
        const BASE_ID = 'appk3RCqRPphjE5i6';

        function login() {
            if(document.getElementById('admin-pass').value === 'timothy123') {
                document.getElementById('login-screen').style.display = 'none';
                loadAllData();
            } else {
                alert('Incorrect password');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-slate-800', 'text-white');
                el.classList.add('text-slate-400');
            });
            document.getElementById('btn-' + tabId).classList.add('bg-slate-800', 'text-white');
            document.getElementById('btn-' + tabId).classList.remove('text-slate-400');
        }

        async function loadAllData() {
            loadTable('Reviews', renderReviewsTable);
            loadTable('Photos', renderPhotosTable);
            loadTable('Pricing', renderPricingTable);
        }

        async function loadTable(table, renderFunc) {
            const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${table}`, {
                headers: { 'Authorization': `Bearer ${API_KEY}` }
            });
            const data = await res.json();
            renderFunc(data.records || []);
        }

        // --- Render Tables ---
        function renderReviewsTable(records) {
            let html = '';
            records.forEach(r => {
                html += `<tr class="border-b"><td class="p-4 font-bold">${r.fields['Customer Name'] || '-'}</td><td class="p-4">${r.fields['Stars'] || '-'}</td><td class="p-4 truncate max-w-xs">${r.fields['Review Text'] || '-'}</td>
                <td class="p-4 text-right"><button onclick="deleteRecord('Reviews', '${r.id}')" class="text-red-600 font-bold hover:underline">Delete</button></td></tr>`;
            });
            document.getElementById('reviews-tbody').innerHTML = html;
        }

        function renderPhotosTable(records) {
            let html = '';
            records.forEach(r => {
                const img = r.fields.Attachments ? r.fields.Attachments[0].url : '';
                html += `<tr class="border-b"><td class="p-4"><img src="${img}" class="w-16 h-16 object-cover rounded"></td><td class="p-4 font-bold">${r.fields['Name'] || '-'}</td>
                <td class="p-4 text-right"><button onclick="deleteRecord('Photos', '${r.id}')" class="text-red-600 font-bold hover:underline">Delete</button></td></tr>`;
            });
            document.getElementById('photos-tbody').innerHTML = html;
        }

        function renderPricingTable(records) {
            let html = '';
            records.forEach(r => {
                html += `<tr class="border-b"><td class="p-4 font-bold">${r.fields['Style'] || '-'}</td><td class="p-4">${r.fields['Size'] || '-'}</td><td class="p-4">$${r.fields['No Foundation'] || '-'}</td>
                <td class="p-4 text-right"><button onclick="deleteRecord('Pricing', '${r.id}')" class="text-red-600 font-bold hover:underline">Delete</button></td></tr>`;
            });
            document.getElementById('pricing-tbody').innerHTML = html;
        }

        // --- Add Records ---
        async function addRecord(event, table, fieldsObj) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "Saving...";

            await fetch(`https://api.airtable.com/v0/${BASE_ID}/${table}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ records: [{ fields: fieldsObj }] })
            });

            btn.innerText = originalText;
            event.target.reset();
            loadAllData();
        }

        function submitReview(e) {
            addRecord(e, 'Reviews', {
                "Customer Name": document.getElementById('rev-name').value,
                "Location": document.getElementById('rev-loc').value,
                "Stars": parseInt(document.getElementById('rev-stars').value),
                "Review Text": document.getElementById('rev-text').value
            });
        }

        function submitPhoto(e) {
            addRecord(e, 'Photos', {
                "Name": document.getElementById('photo-name').value,
                "Attachments": [{ "url": document.getElementById('photo-url').value }]
            });
        }

        function submitPricing(e) {
            addRecord(e, 'Pricing', {
                "Style": document.getElementById('price-style').value,
                "Size": document.getElementById('price-size').value,
                "No Foundation": document.getElementById('price-amt').value
            });
        }

        // --- Delete Records ---
        async function deleteRecord(table, recordId) {
            if(!confirm('Are you sure you want to delete this?')) return;
            await fetch(`https://api.airtable.com/v0/${BASE_ID}/${table}/${recordId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${API_KEY}` }
            });
            loadAllData();
        }
    </script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen flex overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-sm">
            <h2 class="text-2xl font-extrabold text-center mb-6">Heidelberg Admin</h2>
            <input type="password" id="admin-pass" class="w-full border px-4 py-3 rounded-lg mb-4 outline-none" placeholder="Password (timothy123)">
            <button onclick="login()" class="w-full bg-red-900 text-white font-bold py-3 rounded-lg">Login</button>
        </div>
    </div>

    <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col flex-shrink-0">
        <div class="text-xl font-extrabold mb-10 text-center border-b border-slate-700 pb-6">Admin Panel</div>
        <nav class="space-y-2 flex-1">
            <button id="btn-tab-reviews" onclick="switchTab('tab-reviews')" class="tab-btn w-full text-left bg-slate-800 text-white px-4 py-3 rounded-lg font-bold transition">⭐ Reviews</button>
            <button id="btn-tab-projects" onclick="switchTab('tab-projects')" class="tab-btn w-full text-left text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-bold transition">📸 Projects</button>
            <button id="btn-tab-pricing" onclick="switchTab('tab-pricing')" class="tab-btn w-full text-left text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-lg font-bold transition">💰 Pricing</button>
        </nav>
        <a href="index.html" class="text-slate-400 hover:text-white text-sm font-bold text-center mt-auto">← View Live Site</a>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <div id="tab-reviews" class="tab-content">
            <h1 class="text-3xl font-extrabold mb-8">Manage Reviews</h1>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">Add New Review</h3>
                    <form onsubmit="submitReview(event)" class="space-y-4">
                        <input type="text" id="rev-name" placeholder="Client Name" class="w-full border p-2 rounded" required>
                        <input type="text" id="rev-loc" placeholder="Location (e.g. Phoenix, AZ)" class="w-full border p-2 rounded" required>
                        <input type="number" id="rev-stars" placeholder="Stars (1-5)" min="1" max="5" class="w-full border p-2 rounded" required>
                        <textarea id="rev-text" placeholder="Review Text..." rows="4" class="w-full border p-2 rounded" required></textarea>
                        <button type="submit" class="w-full bg-red-900 text-white font-bold py-2 rounded">Add Review</button>
                    </form>
                </div>
                <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200">
                    <table class="w-full text-left text-sm"><thead class="bg-slate-50 border-b"><tr><th class="p-4">Name</th><th class="p-4">Stars</th><th class="p-4">Review</th><th class="p-4"></th></tr></thead>
                    <tbody id="reviews-tbody"></tbody></table>
                </div>
            </div>
        </div>

        <div id="tab-projects" class="tab-content hidden">
            <h1 class="text-3xl font-extrabold mb-8">Manage Portfolio</h1>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">Add New Project Photo</h3>
                    <p class="text-xs text-slate-500 mb-4">Paste a direct link to an image (URL) to upload it to the website.</p>
                    <form onsubmit="submitPhoto(event)" class="space-y-4">
                        <input type="text" id="photo-name" placeholder="Project Name (e.g. 12x20 Gable)" class="w-full border p-2 rounded" required>
                        <input type="url" id="photo-url" placeholder="Image URL (https://...)" class="w-full border p-2 rounded" required>
                        <button type="submit" class="w-full bg-red-900 text-white font-bold py-2 rounded">Add Photo</button>
                    </form>
                </div>
                <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200">
                    <table class="w-full text-left text-sm"><thead class="bg-slate-50 border-b"><tr><th class="p-4">Image</th><th class="p-4">Project Name</th><th class="p-4"></th></tr></thead>
                    <tbody id="photos-tbody"></tbody></table>
                </div>
            </div>
        </div>

        <div id="tab-pricing" class="tab-content hidden">
            <h1 class="text-3xl font-extrabold mb-8">Manage Pricing</h1>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">Add Shed Pricing</h3>
                    <form onsubmit="submitPricing(event)" class="space-y-4">
                        <input type="text" id="price-style" placeholder="Style (e.g. Lean-to)" class="w-full border p-2 rounded" required>
                        <input type="text" id="price-size" placeholder="Size (e.g. 8x10)" class="w-full border p-2 rounded" required>
                        <input type="number" id="price-amt" placeholder="Base Price ($)" class="w-full border p-2 rounded" required>
                        <button type="submit" class="w-full bg-red-900 text-white font-bold py-2 rounded">Add Pricing</button>
                    </form>
                </div>
                <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200">
                    <table class="w-full text-left text-sm"><thead class="bg-slate-50 border-b"><tr><th class="p-4">Style</th><th class="p-4">Size</th><th class="p-4">Price</th><th class="p-4"></th></tr></thead>
                    <tbody id="pricing-tbody"></tbody></table>
                </div>
            </div>
        </div>

    </main>
</body>
</html>
